services:
  db:
    image: postgres:16-alpine
    container_name: parkflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parkflow
    ports:
      - "5432:5432"
    volumes:
      - parkflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d parkflow"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  parkflow_pgdata:
